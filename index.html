<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Afell 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f0f1a;
  color: white;
  overflow: hidden;
}

/* OPENING */
#opening {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #1e1e2f, #0f0f1a);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
  transition: 1s;
}

#opening button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

/* MAIN */
#main {
  opacity: 0;
  transition: 1.5s;
}

/* FOTO ATAS */
.gallery {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 15px;
}

.gallery img {
  width: 100%;
  height: 80px;
  object-fit: cover;
  border-radius: 12px;
  opacity: 0.7;
  transition: 0.4s;
}

.gallery img:hover {
  transform: scale(1.1);
  opacity: 1;
}

/* FOTO UTAMA */
.container {
  text-align: center;
}

.main-img {
  width: 260px;
  border-radius: 20px;
  margin-top: 10px;
  box-shadow: 0 0 25px rgba(255,255,255,0.2);
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  50% { transform: translateY(-10px); }
}

/* TEXT */
#typing {
  max-width: 320px;
  margin: auto;
  line-height: 1.5;
  white-space: pre-line;
}

/* HEART */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 18px;
  animation: naik 5s linear infinite;
}

@keyframes naik {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(-100vh); opacity:0; }
}
</style>
</head>

<body>

<!-- OPENING -->
<div id="opening">
  <h2>Klik ya sayang 💌</h2>
  <button onclick="start()">Masuk</button>
</div>

<!-- AUDIO -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="main">

  <!-- FOTO -->
  <div class="gallery">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
    <img src="foto4.jpg">
    <img src="foto5.jpg">
  </div>

  <div class="container">
    <img src="foto1.jpg" class="main-img">

    <h2>Happy Birthday 🎉</h2>

    <!-- TEXT KETIK -->
    <p id="typing"></p>
  </div>

</div>

<script>
// UCAPAN ASLI (GA DIUBAH)
const text = `haiii afellll sayanggg💐
happy level up yaa sayanggg
panjang umurr sehatt selalu gantengggg🫶🏻
semogaa semua impian kamu tercapai,
jadi pribadi yang lebih dewasa,
dan tetap semangat yaa aca selalu doain kamu🤍
sayanggg maafin aca ya slama ini ada salah sama kamuu,selalu bikin masalah:(
semoga kedepannya hubungan kita lebih baik lagi yaa aamiinn🤍 heheeee udaaa legall nihhhh pibessdeyyyy yawww bocikkkkkuuu😡🫶🏻
bahagia selaluuuu bocikkk kesayangan acaaaaaaaaa❤‍🩹🫂`;

let i = 0;

function typeText() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 40);
  }
}

function start() {
  document.getElementById("opening").style.opacity = "0";

  setTimeout(() => {
    document.getElementById("opening").style.display = "none";
    document.getElementById("main").style.opacity = "1";
    typeText(); // mulai ketik
  }, 800);

  document.getElementById("bgm").play();
}

/* HEART EFFECT */
setInterval(() => {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = Math.random()*100 + "vw";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 5000);
}, 300);
</script>

</body>
</html>
