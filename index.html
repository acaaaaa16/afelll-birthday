<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
}

/* layar awal */
#start {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

button {
    padding: 20px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    background: pink;
    cursor: pointer;
}

/* konten utama */
.center {
    text-align: center;
    margin-top: 20vh;
}

h1 {
    font-size: 40px;
    animation: zoom 2s infinite alternate;
}

@keyframes zoom {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
}

/* foto slide */
img {
    width: 200px;
    border-radius: 20px;
    margin-top: 20px;
}

/* love */
.heart {
    position: absolute;
    animation: naik 5s linear infinite;
}

@keyframes naik {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: white;
    animation: jatuh 5s linear infinite;
}

@keyframes jatuh {
    0% { transform: translateY(-10vh); }
    100% { transform: translateY(100vh); }
}
</style>
</head>

<body>

<!-- layar awal -->
<div id="start">
    <button onclick="mulai()">Klik dulu ya 💖</button>
</div>

<!-- musik -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<!-- isi -->
<div class="center">
    <h1>🎉 Happy Birthday 🎂</h1>
    <p id="text"></p>
    <img id="foto" src="foto1.jpg">
</div>

<script>

// tombol start
function mulai() {
    document.getElementById("start").style.display = "none";
    document.getElementById("music").play();
}

// typing text
const pesan = "Semoga kamu selalu bahagia 💕 Aku sayang kamu 😭";
let i = 0;
function ketik() {
    if (i < pesan.length) {
        document.getElementById("text").innerHTML += pesan.charAt(i);
        i++;
        setTimeout(ketik, 70);
    }
}
ketik();

// slide foto
const fotos = ["foto1.jpg", "foto2.jpg"];
let index = 0;

setInterval(() => {
    index = (index + 1) % fotos.length;
    document.getElementById("foto").src = fotos[index];
}, 2000);

// heart
function heart() {
    const h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML = "💖";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = Math.random() * 30 + 20 + "px";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
}
setInterval(heart, 200);

// confetti
function confetti() {
    const c = document.createElement("div");
    c.classList.add("confetti");
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = ["red","yellow","blue","green","pink"][Math.floor(Math.random()*5)];
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
}
setInterval(confetti, 100);

</script>

</body>
</html>
