<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for afell 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  background: radial-gradient(circle, #1a001a, black);
  overflow:hidden;
  color:white;
}

/* MINI FOTO (ATAS) */
.gallery{
  position:absolute;
  top:5%;
  left:50%;
  transform:translateX(-50%);
  display:grid;
  grid-template-columns:repeat(3,70px);
  gap:10px;
}

.gallery img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:10px;
  box-shadow:0 0 10px rgba(255,140,207,0.5);
}

/* FRAME FOTO UTAMA */
.photo-frame{
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  width:250px;
  height:300px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 25px rgba(255,140,207,0.6);
}

/* SLIDE */
.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  animation:fade 25s infinite;
}

.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:5s;}
.slide:nth-child(3){animation-delay:10s;}
.slide:nth-child(4){animation-delay:15s;}
.slide:nth-child(5){animation-delay:20s;}

@keyframes fade{
  0%{opacity:0}
  8%{opacity:1}
  28%{opacity:1}
  36%{opacity:0}
  100%{opacity:0}
}

/* TEXT */
.container{
  position:absolute;
  top:70%;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  max-width:400px;
  padding:15px;
  border-radius:15px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  text-align:center;
}

h1{
  font-size:20px;
  color:#ff8ccf;
}

#typing{
  font-size:14px;
  line-height:1.6;
  white-space:pre-line;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:6px 12px;
  border:none;
  border-radius:10px;
  background:#ff8ccf;
  color:white;
}

/* HEART */
.heart{
  position:fixed;
  bottom:-10px;
  animation:float 6s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  100%{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<!-- MINI FOTO -->
<div class="gallery">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
  <img src="foto3.jpg">
  <img src="foto4.jpg">
  <img src="foto5.jpg">
</div>

<!-- FRAME UTAMA -->
<div class="photo-frame">
  <img src="foto1.jpg" class="slide">
  <img src="foto2.jpg" class="slide">
  <img src="foto3.jpg" class="slide">
  <img src="foto4.jpg" class="slide">
  <img src="foto5.jpg" class="slide">
</div>

<!-- TEXT -->
<div class="container">
  <h1>for afell 💖</h1>
  <div id="typing"></div>
  <button onclick="start()">tap here</button>
</div>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<script>
const text = `haiii afellll sayanggg 💐

happy level up yaa sayanggg panjang umurr sehatt selalu gantengggg ✨

semogaa semua impian kamu tercapai, jadi pribadi yang lebih dewasa 

dan tetap semangat yaa aca selalu doain kamu 💕

sayanggg maafin aca ya slama ini ada salah sama kamuu,selalu bikin masalah:( 

semoga kedepannya hubungan kita lebih baik lagi yaa aamiinn 🤍

heheeee udaaa legall nihhhh pibessdeyyyy yawww bocikkkkkuuu 🎂

bahagia selaluuuu bocikkk kesayangan acaaaaaaaa ❤‍🩹🫂`;

let i=0;

function start(){
  document.getElementById("music").play();
  function type(){
    if(i<text.length){
      document.getElementById("typing").innerHTML+=text.charAt(i);
      i++;
      setTimeout(type,25);
    }
  }
  type();
}

setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},1200);
</script>

</body>
</html>
