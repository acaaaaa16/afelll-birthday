<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for afell 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: 'Segoe UI', sans-serif;
  background:black;
  overflow:hidden;
  color:white;
}

/* SLIDESHOW HALUS */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.bg img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  animation:fade 25s infinite;
}

/* 5 FOTO */
.bg img:nth-child(1){animation-delay:0s;}
.bg img:nth-child(2){animation-delay:5s;}
.bg img:nth-child(3){animation-delay:10s;}
.bg img:nth-child(4){animation-delay:15s;}
.bg img:nth-child(5){animation-delay:20s;}

@keyframes fade{
  0%{opacity:0}
  8%{opacity:1}
  28%{opacity:1}
  36%{opacity:0}
  100%{opacity:0}
}

/* GLASS BOX */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  max-width:400px;
  padding:20px;
  border-radius:20px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  text-align:center;
}

/* JUDUL */
h1{
  font-size:22px;
  margin-bottom:10px;
  letter-spacing:2px;
  color:#ff8ccf;
}

/* TEXT */
#typing{
  font-size:14px;
  line-height:1.6;
  white-space:pre-line;
  opacity:0.9;
}

/* HEART MINIMAL */
.heart{
  position:fixed;
  bottom:-10px;
  font-size:14px;
  opacity:0.6;
  animation:float 6s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  100%{transform:translateY(-100vh);}
}

/* BUTTON */
button{
  margin-top:15px;
  padding:8px 15px;
  border:none;
  border-radius:10px;
  background:#ff8ccf;
  color:white;
  font-size:13px;
}
</style>
</head>

<body>

<!-- FOTO -->
<div class="bg">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
  <img src="foto3.jpg">
  <img src="foto4.jpg">
  <img src="foto5.jpg">
</div>

<!-- BOX -->
<div class="container">
  <h1>for afell 💖</h1>
  <div id="typing"></div>
  <button onclick="start()">tap here</button>
</div>

<!-- MUSIK -->
<audio id="music" loop>
  <source src="music.mp3">
</audio>

<script>
const text = `haiii afellll sayanggg 💖
happy level up yaa sayanggg panjang umurr sehatt selalu gantengggg ✨
semogaa semua impian kamu tercapai, jadi pribadi yang lebih dewasa 🥺
dan tetap semangat yaa aca selalu doain kamu 💕
sayanggg maafin aca ya slama ini ada salah sama kamu:(selalu bikin masalah:( 
semoga kedepannya hubungan kita lebih baik lagi yaa aamiinn 🤍
heheeee udaaa legall nihhhh pibessdeyyyy yawww bocikkkkkuuu 🎂
bahagia selaluuuu bocikkk kesayangan acaaaaaaaa 💗`;

let i=0;

function start(){
  document.getElementById("music").play();

  function type(){
    if(i<text.length){
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(type,25);
    }
  }
  type();
}

/* HEART */
setInterval(()=>{
  let h = document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);

  setTimeout(()=>h.remove(),6000);
},1200);
</script>

</body>
</html>
